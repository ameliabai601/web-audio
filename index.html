<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Breathing System</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/addons/p5.sound.min.js"></script>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="splash">
      <div class="title">breathing system</div>
      <div class="subtitle">another day of sun — la la land</div>
      <div class="hint">click anywhere to begin</div>
    </div>

    <div id="hud">
      <span id="stateText">calm</span>
      <span class="dot">•</span>
      <span id="levelText">breath 0</span>
      <span class="dot">•</span>
      <span>click to play / pause</span>
    </div>

    <script src="sketch.js"></script>
  </body>
</html>
